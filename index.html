<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>weatherRain</title>
    <link rel="stylesheet" href="src/style.css">
  </head>
  <body>
    
    <nav class="container">
      <h1 class="nav__logo">WeatherRain</h1>
      <button class="settings__btn" id="settingsBtn"><!--settingsIcon--> Units <!--trayIcon--></button>
    </nav>
    <header class="container">
      <p>How's the sky looking today?</p>
      <div class="search__container">
        <input type="text" name="search" id="searchInput" placeholder="Search for a place..." class="search__input search" />
        <input type="submit" value="Search" id="searchBtn" class="search__btn search">
      </div>
    </header>

    <main class="container">
      <div class="weatherScreen__container">
        <div class="mainWeather">
          <!-- COVER BG, SPACING, ICON -->
          <!-- <div class="mainWeatherInfo" > -->
          <h2 id="mainWeatherTitle" class="mainWeatherTitle">Maykop</h2>
          <p id="mainWeatherDate" class="mainWeatherDate">Tuesday, Aug 5, 2025</p>
          <!-- </div> -->
            <!-- sun/rain/cloudy Icon on that line-->
          <p class="mainWeatherTemperature"> <span id="mainWeatherTemperature">20</span><span>°</span></p>
        </div>
        <div class="specsWeather__container">

          <div class="specFeel spec">
            <p class="specTitle">Feels Like</p>
            <p class="specValue"><span id="feel">18</span><span>°</span></p>
          </div>

          <div class="specHumidity spec">
            <p class="specTitle">Humidity</p>
            <p class="specValue"><span id="humidity">46</span><span>%</span></p>
          </div>

          <div class="specWind spec">
            <p class="specTitle">Wind</p>
            <p class="specValue"><span id="wind">14</span> <span>km/h</span></p>
          </div>

          <div class="specPrecipitation spec">
            <p class="specTitle">Precipitation</p>
            <p class="specValue"><span id="precipitation">0</span> <span>mm</span></p>  
          </div>

        </div>
      </div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
